name: Build and Publish

on:
    workflow_dispatch:
    push:
        branches:
            - main
        paths-ignore:
            - "**/*.md"
            - "**/*.gitignore"
            - "**/*.gitattributes"

jobs:
    build:
        permissions:
            contents: write
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - uses: actions/setup-node@v4
              with:
                  node-version: 20

            - name: 📦 Install dependencies
              run: npm install

            - name: 🎁 Install vsce
              run: npm install -g @vscode/vsce

            - name: 🖥️ Install cross-env
              run: npm install -g cross-env

            - name: 🏷️ NBGV
              uses: dotnet/nbgv@master
              id: nbgv
              with:
                  stamp: package.json

            - name: 🗣️ NBGV outputs
              run: |
                  echo "SimpleVersion: ${{ steps.nbgv.outputs.SimpleVersion }}"

            - name: 🆔 Read Marketplace ID
              id: meta
              shell: bash
              run: |
                  PUBLISHER=$(node -p "require('./package.json').publisher")
                  NAME=$(node -p "require('./package.json').name")
                  echo "marketplaceId=${PUBLISHER}.${NAME}" >> "$GITHUB_OUTPUT"

            - name: 🧪 Detect proposed APIs
              id: proposed
              shell: bash
              run: |
                  USES_PROPOSED=$(node -p "Array.isArray(require('./package.json').enabledApiProposals) && require('./package.json').enabledApiProposals.length > 0")
                  echo "usesProposed=${USES_PROPOSED}" >> "$GITHUB_OUTPUT"

            - name: 📦 Package
              run: |
                  vsce package -o ./${{ github.event.repository.name }}.vsix

            - name: 📰 Publish
              if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.proposed.outputs.usesProposed == 'false' }}
              run: npm run deploy
              env:
                  VSCE_PAT: ${{ secrets.VSCE_PAT }}

            - name: 🚧 Skipping Marketplace publish (proposed APIs)
              if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.proposed.outputs.usesProposed == 'true' }}
              shell: pwsh
              run: |
                  Write-Host "::notice::Skipping Marketplace publish: package.json declares enabledApiProposals. Distribute the VSIX via GitHub Releases instead. Users must launch VS Code with --enable-proposed-api ${{ steps.meta.outputs.marketplaceId }}."

            - name: 🔗 Marketplace Link
              if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.proposed.outputs.usesProposed == 'false' }}
              shell: pwsh
              run: |
                  Write-Host "::notice::Published to VS Code Marketplace: https://marketplace.visualstudio.com/items?itemName=${{ steps.meta.outputs.marketplaceId }}"

            - name: ⬆️ Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ github.event.repository.name }}.vsix
                  path: ./*.vsix

            - name: 🏷️ Tag and Release
              id: tag_release
              uses: softprops/action-gh-release@v1
              with:
                  body: Release ${{ steps.nbgv.outputs.SimpleVersion }}
                  tag_name: ${{ steps.nbgv.outputs.SimpleVersion }}
                  generate_release_notes: true
                  files: ./*.vsix
